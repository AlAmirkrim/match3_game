name: match3_game
description: A Match-3 puzzle game inspired by Royal Match
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.18.0
  flutter_animate: ^4.5.0
  audioplayers: ^6.0.0
  shared_preferences: ^2.2.3
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
  fonts:
    - family: GameFont
      fonts:
        - asset: assets/fonts/GameFont.ttf
